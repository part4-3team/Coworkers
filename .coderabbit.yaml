language: "ko-KR"
tone_instructions: |
  리뷰는 한국어로 작성하고, 팀 컨벤션(Next.js/TypeScript/Tailwind, RHF+Zod, TanStack Query)을 우선 반영하세요.
reviews:
  profile: "chill"
  high_level_summary: true
  poem: false
  review_status: true
  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        - any 타입 사용 금지
        - API 응답 데이터는 반드시 Zod 스키마로 런타임 검증
        - z.infer<typeof Schema>로 타입 추출하여 중복 타입 선언 금지
        - 서버 상태는 TanStack Query의 useQuery / useMutation 사용
        - fetch 직접 사용 금지, queryFn 내부에서만 사용
        - queryKey는 일관된 네이밍 규칙 유지 (예: ['resource', id])
        - 성공 후 관련 캐시는 invalidateQueries로 무효화
        - 모든 폼은 React Hook Form 사용 (useState로 폼 상태 관리 금지)
        - 검증 로직은 반드시 Zod 스키마로 분리하고 zodResolver로 연결
        - 변수 선언은 const 우선 사용
        - 커스텀 훅은 use 접두사 필수
        - 컴포넌트는 default export, 유틸 함수는 named export 사용
        - 조건부 렌더링 시 && 대신 삼항 연산자 권장 (0 렌더링 방지)
    - path: "**/*.{tsx,jsx}"
      instructions: |
        - 스타일링은 Tailwind CSS만 사용
        - 인라인 style 속성 사용 금지
        - axios 사용 금지, fetch만 사용
